<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .pull { stroke-dasharray: 10 8; animation: pullIn 0.7s linear infinite; }
    .push { stroke-dasharray: 10 8; animation: pushOut 0.7s linear infinite; }
    .pushSlow { stroke-dasharray: 10 8; animation: pushOut 1.1s linear infinite; }
    @keyframes pullIn  { to { stroke-dashoffset: 18; } }
    @keyframes pushOut { to { stroke-dashoffset: -18; } }
    .warn { animation: pulse 1.3s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
    .cap { font-size: 14px; fill: #475569; }
    .small { font-size: 12.5px; fill: #64748b; }
    .lbl { font-size: 14px; font-weight: 600; }
  </style>
  <defs>
    <marker id="arrE" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrS" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e11d48"/>
    </marker>
  </defs>

  <text x="460" y="32" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">One anchor, one batch — where the gradient pushes and pulls</text>

  <!-- anchor -->
  <circle cx="250" cy="190" r="52" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>
  <text x="250" y="185" text-anchor="middle" class="lbl" fill="#4f46e5">anchor</text>
  <text x="250" y="205" text-anchor="middle" class="small">"How do I learn Python?"</text>

  <!-- positive: pulled IN (dashes flow toward the anchor) -->
  <circle cx="640" cy="95" r="44" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/>
  <text x="640" y="90" text-anchor="middle" class="lbl" fill="#059669">positive</text>
  <text x="640" y="110" text-anchor="middle" class="small">"Best way to learn Python?"</text>
  <line x1="592" y1="115" x2="316" y2="172" stroke="#059669" stroke-width="4" class="pull" marker-end="url(#arrE)"/>
  <text x="455" y="118" text-anchor="middle" class="lbl" fill="#059669">pull together 🧲</text>

  <!-- true negative: pushed OUT (dashes flow away from the anchor) -->
  <circle cx="660" cy="285" r="44" fill="#f8fafc" stroke="#64748b" stroke-width="2.5"/>
  <text x="660" y="280" text-anchor="middle" class="lbl" fill="#475569">negative</text>
  <text x="660" y="300" text-anchor="middle" class="small">"How tall is Everest?"</text>
  <line x1="312" y1="215" x2="606" y2="270" stroke="#64748b" stroke-width="4" class="push" marker-end="url(#arrS)"/>
  <text x="450" y="230" text-anchor="middle" class="lbl" fill="#475569">push apart ✅</text>

  <!-- false negative: pushed out, but wrongly -->
  <circle cx="835" cy="180" r="44" fill="#fff1f2" stroke="#e11d48" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="835" y="170" text-anchor="middle" class="lbl" fill="#e11d48">"negative"</text>
  <text x="835" y="190" text-anchor="middle" class="small">"Learning Python —</text>
  <text x="835" y="205" text-anchor="middle" class="small">where to start?"</text>
  <line x1="306" y1="190" x2="782" y2="182" stroke="#e11d48" stroke-width="4" class="pushSlow" marker-end="url(#arrR)"/>
  <text x="545" y="172" text-anchor="middle" class="lbl" fill="#e11d48">pushed apart — WRONGLY</text>
  <text x="835" y="118" text-anchor="middle" font-size="22" class="warn">⚠️</text>
  <text x="835" y="248" text-anchor="middle" class="small warn" fill="#e11d48">a duplicate paired elsewhere in the batch</text>

  <text x="460" y="352" text-anchor="middle" class="cap">QQP is ~37% duplicates → in a batch of 64 pairs each anchor faces 126 "negatives", and a material share are secretly positives.</text>
</svg>
