<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .cap { font-size: 14px; fill: #475569; }
    .title { font-size: 16px; font-weight: 600; fill: #1e293b; }
    .small { font-size: 12px; fill: #64748b; }
  </style>
  <defs>
    <marker id="arrowIndigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f46e5"/>
    </marker>
    <marker id="arrowEmerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
  </defs>

  <!-- ================= LEFT PANEL: rotation preserves the relative angle ================= -->
  <text x="230" y="34" text-anchor="middle" class="title">Both tokens shift position → both vectors rotate together</text>

  <!-- axes -->
  <line x1="60" y1="230" x2="400" y2="230" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="215" y1="80" x2="215" y2="360" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- rotating group: q, k and the invariant arc all rotate as one -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      values="0 215 230; 55 215 230; 55 215 230; 0 215 230; 0 215 230"
      keyTimes="0; 0.4; 0.5; 0.9; 1" dur="6s" repeatCount="indefinite"/>
    <!-- q at 20 deg -->
    <line x1="215" y1="230" x2="337" y2="186" stroke="#4f46e5" stroke-width="4" marker-end="url(#arrowIndigo)"/>
    <text x="349" y="184" font-size="15" font-weight="600" fill="#4f46e5">q (pos m)</text>
    <!-- k at 70 deg -->
    <line x1="215" y1="230" x2="259" y2="108" stroke="#059669" stroke-width="4" marker-end="url(#arrowEmerald)"/>
    <text x="264" y="100" font-size="15" font-weight="600" fill="#059669">k (pos n)</text>
    <!-- invariant arc between them -->
    <path d="M 281 206 A 70 70 0 0 0 239 164" fill="none" stroke="#d97706" stroke-width="3.5"/>
    <text x="292" y="176" font-size="14" font-weight="600" fill="#d97706">(n−m)θ</text>
  </g>

  <text x="230" y="388" text-anchor="middle" class="cap">The amber angle — relative position — NEVER changes.</text>
  <text x="230" y="408" text-anchor="middle" class="small">Orthogonality: R(mθ)ᵀR(nθ) = R((n−m)θ) — absolute rotations cancel.</text>

  <!-- ================= RIGHT PANEL: frequency spectrum ================= -->
  <text x="680" y="34" text-anchor="middle" class="title">One head = d/2 pairs, each rotating at its own speed</text>

  <!-- wheel 1: fast -->
  <g>
    <circle cx="520" cy="190" r="42" fill="#eef2ff" stroke="#94a3b8" stroke-width="2"/>
    <line x1="520" y1="190" x2="520" y2="152" stroke="#4f46e5" stroke-width="4" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 520 190" to="360 520 190" dur="1.2s" repeatCount="indefinite"/>
    </line>
    <text x="520" y="258" text-anchor="middle" class="cap">pair 0</text>
    <text x="520" y="276" text-anchor="middle" class="small">fastest</text>
  </g>
  <!-- wheel 2 -->
  <g>
    <circle cx="628" cy="190" r="42" fill="#eef2ff" stroke="#94a3b8" stroke-width="2"/>
    <line x1="628" y1="190" x2="628" y2="152" stroke="#4f46e5" stroke-width="4" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 628 190" to="360 628 190" dur="3s" repeatCount="indefinite"/>
    </line>
    <text x="628" y="258" text-anchor="middle" class="cap">pair 1</text>
  </g>
  <!-- wheel 3 -->
  <g>
    <circle cx="736" cy="190" r="42" fill="#eef2ff" stroke="#94a3b8" stroke-width="2"/>
    <line x1="736" y1="190" x2="736" y2="152" stroke="#4f46e5" stroke-width="4" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 736 190" to="360 736 190" dur="8s" repeatCount="indefinite"/>
    </line>
    <text x="736" y="258" text-anchor="middle" class="cap">pair 2</text>
  </g>
  <!-- wheel 4: slow -->
  <g>
    <circle cx="844" cy="190" r="42" fill="#eef2ff" stroke="#94a3b8" stroke-width="2"/>
    <line x1="844" y1="190" x2="844" y2="152" stroke="#4f46e5" stroke-width="4" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 844 190" to="360 844 190" dur="20s" repeatCount="indefinite"/>
    </line>
    <text x="844" y="258" text-anchor="middle" class="cap">pair d/2−1</text>
    <text x="844" y="276" text-anchor="middle" class="small">slowest</text>
  </g>

  <text x="680" y="330" text-anchor="middle" class="cap">θᵢ = 10000^(−2i/d) — a spectrum of clocks:</text>
  <text x="680" y="352" text-anchor="middle" class="cap">fast pairs read fine local position, slow pairs read coarse long-range position.</text>
</svg>
